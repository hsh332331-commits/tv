  els.statTotal = document.getElementById('statTotal');
  els.statHls = document.getElementById('statHls');
  els.statTs = document.getElementById('statTs');
  els.statFav = document.getElementById('statFav');
  els.favOnlyBtn = document.getElementById('favOnlyBtn');
  els.clearBtn = document.getElementById('clearBtn');
  els.homeBtn = document.getElementById('homeBtn');
  els.overlay = document.getElementById('playerOverlay');
  els.video = document.getElementById('videoPlayer');
  els.status = document.getElementById('playerStatus');
  els.playerTitle = document.getElementById('playerTitle');
  els.streamTypeText = document.getElementById('streamTypeText');
  els.toast = document.getElementById('toast');
}

function isTsUrl(url) {
  var u = String(url || '').toLowerCase();
  return u.indexOf('.ts') >= 0 || u.indexOf('extension=ts') >= 0 || u.indexOf('.m3u8') < 0;
}

function prepareChannelCache() {
  for (var i = 0; i < CHANNELS.length; i++) {
    var ch = CHANNELS[i] || {};
    ch._idx = i;
    ch._name = String(ch.n || 'قناة بدون اسم');
    ch._category = String(ch.c || 'غير مصنف');
    ch._search = normalizeText(ch._name + ' ' + ch._category);
    ch._type = isTsUrl(ch.u) ? 'TS' : 'HLS';
    ch._quality = getQuality(ch._name);
    ch._logo = normalizeLogoUrl(ch.l);
    ch._key = channelKey(ch);
  }
}

function bindEvents() {
  els.search.addEventListener('input', debounce(function() {
    state.query = normalizeText(els.search.value);
    applyFilters();
  }, 120));

  els.categories.addEventListener('click', function(e) {
    var btn = e.target.closest('[data-cat]');
    if (!btn) return;
    state.category = btn.getAttribute('data-cat') || 'الكل';
    setActiveButton(els.categories, btn);
    applyFilters();
  });

  els.filters.addEventListener('click', function(e) {
    var btn = e.target.closest('[data-filter]');
    if (!btn) return;
    state.filter = btn.getAttribute('data-filter') || 'all';
    state.quality = btn.getAttribute('data-quality') || '';
    setActiveButton(els.filters, btn);
    applyFilters();
  });

  els.grid.addEventListener('click', function(e) {
    var fav = e.target.closest('[data-fav]');
    if (fav) {
      e.preventDefault();
      e.stopPropagation();
      toggleFavorite(Number(fav.getAttribute('data-fav')));
      return;
    }
    var cardBtn = e.target.closest('[data-play]');
    if (!cardBtn) return;
    playChannel(Number(cardBtn.getAttribute('data-play')));
  });

  els.favOnlyBtn.addEventListener('click', function() {
    state.favoritesOnly = !state.favoritesOnly;
    els.favOnlyBtn.classList.toggle('active', state.favoritesOnly);
    applyFilters();
  });

  els.clearBtn.addEventListener('click', resetFilters);
  els.homeBtn.addEventListener('click', resetFilters);
  els.homeBtn.addEventListener('keydown', function(e) { if (e.key === 'Enter' || e.key === ' ') resetFilters(); });
  document.getElementById('closePlayerBtn').addEventListener('click', closePlayer);
  els.overlay.addEventListener('click', function(e) { if (e.target === els.overlay) closePlayer(); });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closePlayer();
    if ((e.ctrlKey || e.metaKey) && String(e.key).toLowerCase() === 'k') { e.preventDefault(); els.search.focus(); }
  });

  els.video.addEventListener('playing', hideStatus);
  els.video.addEventListener('canplay', hideStatus);
  els.video.addEventListener('stalled', function() { if (currentChannelIndex >= 0) showStatus('جاري تحسين التحميل...', true); });
  els.video.addEventListener('suspend', function() { if (currentChannelIndex >= 0) showStatus('جاري تحسين التحميل...', true); });
  els.video.addEventListener('error', function() { if (currentChannelIndex >= 0) showStreamFailure(currentChannelIndex, 'تعذر تشغيل الفيديو في المتصفح.'); });
}

function resetFilters() {
  state.category = 'الكل';
  state.query = '';
  state.filter = 'all';
  state.quality = '';
  state.favoritesOnly = false;
  els.search.value = '';
  els.favOnlyBtn.classList.remove('active');
  setActiveByValue(els.categories, 'data-cat', 'الكل');
  setActiveByValue(els.filters, 'data-filter', 'all');
  applyFilters();
}

function setActiveButton(parent, btn) {
  var all = parent.querySelectorAll('button');
  for (var i = 0; i < all.length; i++) all[i].classList.remove('active');
  btn.classList.add('active');
}

function setActiveByValue(parent, attr, value) {
  var all = parent.querySelectorAll('button');
  for (var i = 0; i < all.length; i++) {
    var active = all[i].getAttribute(attr) === value;
    all[i].classList.toggle('active', active);
  }
}

function renderStats() {
  var h = 0, t = 0;
  for (var i = 0; i < CHANNELS.length; i++) { if (CHANNELS[i]._type === 'HLS') h++; else t++; }
  els.statTotal.textContent = CHANNELS.length;
  els.statHls.textContent = h;
  els.statTs.textContent = t;
  els.total.textContent = CHANNELS.length;
  updateFavStat();
}

function renderCategories() {
  var counts = {};
  for (var i = 0; i < CHANNELS.length; i++) {
    var cat = CHANNELS[i]._category || 'غير مصنف';
    counts[cat] = (counts[cat] || 0) + 1;
  }
  var cats = Object.keys(counts).sort(function(a,b) { return a.localeCompare(b, 'ar'); });
  var frag = document.createDocumentFragment();
  frag.appendChild(makeCategoryButton('الكل', CHANNELS.length, true));
  for (var j = 0; j < cats.length; j++) frag.appendChild(makeCategoryButton(cats[j], counts[cats[j]], false));
  els.categories.textContent = '';
  els.categories.appendChild(frag);
}

function makeCategoryButton(cat, count, active) {
  var b = document.createElement('button');
  b.type = 'button';
  b.className = 'cat-btn' + (active ? ' active' : '');
  b.setAttribute('data-cat', cat);
  b.appendChild(document.createTextNode(cat));
  var s = document.createElement('span');
  s.className = 'cat-count';
  s.textContent = '(' + count + ')';
  b.appendChild(s);
  return b;
}

function applyFilters() {
  var list = [];
  for (var i = 0; i < CHANNELS.length; i++) {
    var ch = CHANNELS[i];
    if (state.category !== 'الكل' && ch._category !== state.category) continue;
    if (state.query && ch._search.indexOf(state.query) < 0) continue;
    if (state.favoritesOnly && !favorites[ch._key]) continue;
    if (state.filter === 'hls' && ch._type !== 'HLS') continue;
    if (state.filter === 'ts' && ch._type !== 'TS') continue;
    if (state.filter === 'quality' && ch._quality !== state.quality) continue;
    list.push(ch);
  }
  els.shown.textContent = list.length;
  renderGrid(list);
}

function renderGrid(list) {
  renderToken++;
  var token = renderToken;
  els.grid.textContent = '';
  if (!list.length) {
    var empty = document.createElement('div');
    empty.className = 'empty';
    empty.innerHTML = '<div><strong>لا توجد قنوات مطابقة</strong><span>جرّب إزالة البحث أو تغيير الفلتر.</span></div>';
    els.grid.appendChild(empty);
    return;
  }
  var index = 0;
  var batch = window.innerWidth < 620 ? 16 : 28;
  function drawBatch() {
    if (token !== renderToken) return;
    var frag = document.createDocumentFragment();
    var end = Math.min(index + batch, list.length);
    for (; index < end; index++) frag.appendChild(createCard(list[index]));
    els.grid.appendChild(frag);
    observeNewImages();
    if (index < list.length) requestAnimationFrame(drawBatch);
  }
  requestAnimationFrame(drawBatch);
}

function createCard(ch) {
  var card = document.createElement('article');
  card.className = 'channel-card';
  var btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'thumb-btn';
  btn.setAttribute('data-play', ch._idx);
  btn.setAttribute('aria-label', 'تشغيل ' + ch._name);

  var thumb = document.createElement('div');
  thumb.className = 'thumb';
  var img = document.createElement('img');
  img.alt = ch._name;
  img.loading = 'lazy';
  img.decoding = 'async';
  img.src = PLACEHOLDER_LOGO;
  img.setAttribute('data-src', ch._logo || PLACEHOLDER_LOGO);
  img.onerror = function() { this.onerror = null; this.src = PLACEHOLDER_LOGO; };
  thumb.appendChild(img);
  thumb.appendChild(makeBadge('type', ch._type));
  if (ch.h && typeof ch.h === 'object' && Object.keys(ch.h).length) thumb.appendChild(makeBadge('header', 'H'));
  if (ch._quality) thumb.appendChild(makeBadge('quality', ch._quality));
  var play = document.createElement('div');
  play.className = 'play';
  play.innerHTML = '<span>▶</span>';
  thumb.appendChild(play);
  btn.appendChild(thumb);
  card.appendChild(btn);

  var fav = document.createElement('button');
  fav.type = 'button';
  fav.className = 'fav-btn' + (favorites[ch._key] ? ' active' : '');
  fav.setAttribute('data-fav', ch._idx);
  fav.setAttribute('aria-label', 'إضافة للمفضلة');
  fav.textContent = '★';
  card.appendChild(fav);

  var info = document.createElement('div');
  info.className = 'info';
  var name = document.createElement('div');
  name.className = 'name';
  name.title = ch._name;
  name.textContent = ch._name;
  var meta = document.createElement('div');
  meta.className = 'meta';
  var cat = document.createElement('span');
  cat.textContent = ch._category;
  var typ = document.createElement('span');
  typ.textContent = ch._quality || ch._type;
  meta.appendChild(cat); meta.appendChild(typ);
  info.appendChild(name); info.appendChild(meta);
  card.appendChild(info);
  return card;
}

function makeBadge(cls, text) {
  var b = document.createElement('span');
  b.className = 'badge ' + cls;
  b.textContent = text;
  return b;
}

function setupLazyImages() {
  if ('IntersectionObserver' in window) {
    imageObserver = new IntersectionObserver(function(entries) {
      for (var i = 0; i < entries.length; i++) {
        if (!entries[i].isIntersecting) continue;
        var img = entries[i].target;
        var src = img.getAttribute('data-src');
        if (src && img.src !== src) img.src = src;
        imageObserver.unobserve(img);
      }
    }, { rootMargin: '280px 0px' });
  }
}

function observeNewImages() {
  var imgs = els.grid.querySelectorAll('img[data-src]');
  for (var i = 0; i < imgs.length; i++) {
    if (imgs[i]._seen) continue;
    imgs[i]._seen = true;
    if (imageObserver) imageObserver.observe(imgs[i]);
    else imgs[i].src = imgs[i].getAttribute('data-src') || PLACEHOLDER_LOGO;
  }
}

function playChannel(idx) {
  var ch = CHANNELS[idx];
  if (!ch || !ch.u) { showToast('رابط هذه القناة غير متاح'); return; }
  playToken++;
  var token = playToken;
  currentChannelIndex = idx;
  isRetrying = false;
  destroyPlayer(false);
  document.body.classList.add('player-open');
  els.overlay.classList.add('show');
  els.playerTitle.textContent = ch._name;
  els.streamTypeText.textContent = ch._quality ? ch._quality + ' / ' + ch._type : ch._type;
  showStatus('جاري تحميل البث...', true);
  startLoadTimeout(token, idx);
  var url = proxyUrl(ch.u, ch.h);
  try {
    if (ch._type === 'TS') playTs(idx, token, url);
    else playHls(idx, token, url);
  } catch (err) {
    clearLoadTimeout();
    showStreamFailure(idx, 'حدث خطأ أثناء التشغيل: ' + (err && err.message ? err.message : err));
  }
}

function playHls(idx, token, url) {
  var nativeHls = els.video.canPlayType('application/vnd.apple.mpegurl');
  if (typeof Hls === 'undefined' || !Hls.isSupported()) {
    if (!nativeHls) { showStreamFailure(idx, 'المتصفح لا يدعم HLS.'); return; }
    els.video.src = url;
    safeVideoPlay(token);
    return;
  }
  currentPlayer = new Hls({
    enableWorker: true,
    lowLatencyMode: true,
    capLevelToPlayerSize: true,
    startLevel: -1,
    maxBufferLength: 30,
    maxMaxBufferLength: 60,
    liveSyncDurationCount: 2,
    liveMaxLatencyDurationCount: 4,
    fragLoadingTimeOut: 15000,
    manifestLoadingTimeOut: 15000,
    fragLoadingMaxRetry: 3,
    manifestLoadingMaxRetry: 3
  });
  currentPlayer.loadSource(url);
  currentPlayer.attachMedia(els.video);
  currentPlayer.on(Hls.Events.MANIFEST_PARSED, function() { if (token === playToken) safeVideoPlay(token); });
  currentPlayer.on(Hls.Events.ERROR, function(e, data) {
    if (token !== playToken || !data || !data.fatal) return;
    var code = data.response && data.response.code ? data.response.code : '';
    if (data.type === Hls.ErrorTypes.NETWORK_ERROR && code) { showStreamFailure(idx, 'فشل تحميل البث. كود الخطأ: ' + code); return; }
    if (!isRetrying && data.type === Hls.ErrorTypes.NETWORK_ERROR && currentPlayer) {
      isRetrying = true;
      showStatus('خطأ مؤقت، إعادة محاولة التحميل...', true);
      setTimeout(function() { if (token === playToken && currentPlayer) currentPlayer.startLoad(); isRetrying = false; }, 1500);
      return;
    }
    showStreamFailure(idx, data.type === Hls.ErrorTypes.MEDIA_ERROR ? 'خطأ ترميز أو توافق في الفيديو.' : 'خطأ في البث. الرابط قد يكون منتهياً أو محجوباً.');
  });
}

function playTs(idx, token, url) {
  if (typeof mpegts === 'undefined' || !mpegts.isSupported()) {
    showStreamFailure(idx, 'المتصفح لا يدعم تشغيل TS.');
    return;
  }
  if (currentPlayer) { try { currentPlayer.destroy(); } catch(e) {} currentPlayer = null; }
  currentPlayer = mpegts.createPlayer({ type: 'mse', url: url, isLive: true }, {
    enableWorker: false,
    enableStashBuffer: true,
    stashInitialSize: 512,
    liveBufferLatencyChasing: false,
    lazyLoad: true,
    lazyMaxLatency: 30,
    lazyReconnect: 5,
    fixAudioTimestampGap: true
  });
  currentPlayer.attachMediaElement(els.video);
  currentPlayer.on(mpegts.Events.ERROR, function(errType, errDetail) {
    if (token !== playToken) return;
    if (!isRetrying && (errType === mpegts.ErrorTypes.NETWORK_ERROR)) {
      isRetrying = true;
      showStatus('انقطع الاتصال، إعادة محاولة...', true);
      setTimeout(function() {
        if (token !== playToken) return;
        if (currentPlayer) { try { currentPlayer.unload(); currentPlayer.load(); } catch(e) {} }
        isRetrying = false;
      }, 1000);
      return;
    }
    showStreamFailure(idx, 'خطأ في البث.');
  });
  currentPlayer.load();
  var p = els.video.play();
  if (p && p.catch) p.catch(function() {});
  hideStatus();
}

function safeVideoPlay(token) {
  if (token !== playToken) return;
  var p = els.video.play();
  if (p && p.catch) p.catch(function(err) {
    if (token !== playToken) return;
    if (err && err.name === 'NotAllowedError') showStatus('اضغط زر التشغيل داخل الفيديو.', false);
  });
}

function destroyPlayer(resetIndex) {
  clearLoadTimeout();
  if (currentPlayer) {
    try { if (currentPlayer.destroy) currentPlayer.destroy(); else if (currentPlayer.unload) { currentPlayer.unload(); currentPlayer.detachMediaElement && currentPlayer.detachMediaElement(); currentPlayer.destroy && currentPlayer.destroy(); } } catch (e) {}
    currentPlayer = null;
  }
  try { els.video.pause(); } catch (e) {}
  els.video.removeAttribute('src');
  try { els.video.load(); } catch (e) {}
  if (resetIndex !== false) currentChannelIndex = -1;
}

function closePlayer() {
  playToken++;
  destroyPlayer(true);
  els.overlay.classList.remove('show');
  document.body.classList.remove('player-open');
  hideStatus();
}

function showStatus(message, loading) {
  els.status.classList.add('show');
  els.status.innerHTML = '<div class="status-card">' + (loading ? '<div class="spinner"></div>' : '') + '<div>' + escapeHtml(message) + '</div></div>';
}

function hideStatus() {
  clearLoadTimeout();
  els.status.classList.remove('show');
}

function showStreamFailure(idx, message) {
  clearLoadTimeout();
  var alt = findAlternativeChannelIndex(idx);
  var html = '<div class="status-card"><div>' + escapeHtml(message || 'الرابط لا يعمل حالياً أو السيرفر يرفض الطلب.') + '</div>';
  if (alt >= 0) html += '<button class="retry-btn" data-status-play="' + alt + '">تشغيل البديل</button>';
  html += '<button class="retry-btn secondary" data-status-play="' + idx + '">إعادة المحاولة</button></div>';
  els.status.classList.add('show');
  els.status.innerHTML = html;
  var buttons = els.status.querySelectorAll('[data-status-play]');
  for (var i = 0; i < buttons.length; i++) {
    buttons[i].addEventListener('click', function() { playChannel(Number(this.getAttribute('data-status-play'))); });
  }
}

function proxyUrl(url, headers) {
  if (!url) return '';
  var httpUrl = String(url).startsWith('http:');
  var hasHeaders = headers && typeof headers === 'object' && Object.keys(headers).length > 0;
  if (!httpUrl && !hasHeaders) return url;
  var params = 'url=' + encodeURIComponent(url);
  if (headers) {
    if (headers.Referer) params += '&Referer=' + encodeURIComponent(headers.Referer);
    if (headers['User-Agent']) params += '&User-Agent=' + encodeURIComponent(headers['User-Agent']);
  }
  return '/proxy?' + params;
}

function startLoadTimeout(token, idx) {
  clearLoadTimeout();
  loadTimer = setTimeout(function() {
    if (token === playToken && els.status.classList.contains('show')) showStreamFailure(idx, 'استغرق التحميل وقتاً طويلاً. قد يكون الرابط بطيئاً أو محجوباً.');
  }, 30000);
}
function clearLoadTimeout() { if (loadTimer) { clearTimeout(loadTimer); loadTimer = null; } }

function normalizeLogoUrl(value) {
  var raw = String(value || '').trim();
  if (!raw) return PLACEHOLDER_LOGO;
  try {
    var u = new URL(raw, location.href);
    if (u.hostname === '51.158.158.30') return PLACEHOLDER_LOGO;
    if (u.protocol === 'http:') return PLACEHOLDER_LOGO;
    return u.href;
  } catch (e) { return PLACEHOLDER_LOGO; }
}

function getQuality(name) {
  var n = String(name || '').toLowerCase();
  if (n.indexOf('4k') >= 0 || n.indexOf('uhd') >= 0) return '4K';
  if (n.indexOf('fhd') >= 0 || n.indexOf('hd') >= 0 || n.indexOf('1080') >= 0 || n.indexOf('720') >= 0) return 'HD';
  if (n.indexOf('sd') >= 0) return 'SD';
  return '';
}
function normalizeText(value) { return String(value || '').toLowerCase().replace(/[أإآ]/g,'ا').replace(/ى/g,'ي').replace(/ة/g,'ه').replace(/\s+/g,' ').trim(); }
function baseChannelName(name) { return normalizeText(name).replace(/\b(4k|uhd|fhd|hd|sd|1080p|720p|576p|480p|360p)\b/g, '').replace(/\s+/g, ' ').trim(); }
function channelKey(ch) { return encodeURIComponent((ch._name || ch.n || '') + '|' + (ch.u || '')); }
function loadFavorites() { try { return JSON.parse(localStorage.getItem('tvFavorites') || '{}') || {}; } catch (e) { return {}; } }
function saveFavorites() { try { localStorage.setItem('tvFavorites', JSON.stringify(favorites)); } catch (e) {} }
function toggleFavorite(idx) {
  var ch = CHANNELS[idx]; if (!ch) return;
  if (favorites[ch._key]) delete favorites[ch._key]; else favorites[ch._key] = 1;
  saveFavorites();
  updateFavStat();
  showToast(favorites[ch._key] ? 'تمت الإضافة للمفضلة' : 'تمت الإزالة من المفضلة');
  applyFilters();
}
function updateFavStat() { var c = 0; for (var k in favorites) if (favorites.hasOwnProperty(k)) c++; if (els.statFav) els.statFav.textContent = c; }
function findAlternativeChannelIndex(idx) {
  var ch = CHANNELS[idx]; if (!ch) return -1;
  var exact = normalizeText(ch._name || ch.n);
  var base = baseChannelName(ch._name || ch.n);
  for (var i = 0; i < CHANNELS.length; i++) if (i !== idx && CHANNELS[i]._category === ch._category && normalizeText(CHANNELS[i]._name) === exact) return i;
  for (var j = 0; j < CHANNELS.length; j++) if (j !== idx && CHANNELS[j]._category === ch._category && baseChannelName(CHANNELS[j]._name) === base) return j;
  return -1;
}
function escapeHtml(value) { return String(value == null ? '' : value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function debounce(fn, wait) { var t; return function() { var ctx = this, args = arguments; clearTimeout(t); t = setTimeout(function() { fn.apply(ctx, args); }, wait); }; }
function showToast(msg) { els.toast.textContent = msg; els.toast.classList.add('show'); clearTimeout(els.toast._t); els.toast._t = setTimeout(function() { els.toast.classList.remove('show'); }, 2400); }
</script>
