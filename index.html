 7px;border-radius:4px;font-size:9px;font-weight:700}.quality-badge{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.7);color:var(--accent);padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}.channel-info{padding:8px 10px 10px}.channel-name{font-size:12px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.channel-quality{font-size:10px;color:var(--text3);margin-top:2px}.no-channels{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text3);font-size:16px}.player-overlay{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.92);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s ease}.player-overlay.show{opacity:1;pointer-events:all}.player-container{width:100%;max-width:1100px;max-height:100vh;display:flex;flex-direction:column;padding:20px;position:relative}.player-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 4px}.player-title{font-size:16px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}.player-title i{color:var(--primary)}.player-close{background:rgba(255,255,255,.1);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:16px;cursor:pointer;transition:var(--transition);display:flex;align-items:center;justify-content:center}.player-close:hover{background:rgba(229,9,20,.6);transform:rotate(90deg)}.player-wrapper{position:relative;background:#000;border-radius:var(--radius);overflow:hidden;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center}.player-wrapper video{width:100%;height:100%;display:block;object-fit:contain}.player-status{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.7);color:var(--text2);font-size:14px;flex-direction:column;gap:12px;opacity:0;pointer-events:none;transition:opacity .3s}.player-status.show{opacity:1}.player-status i{font-size:36px;color:var(--primary)}.player-controls{display:flex;align-items:center;gap:12px;margin-top:10px;padding:0 4px}.stream-badge{font-size:12px;padding:4px 12px;border-radius:20px;display:inline-flex;align-items:center;gap:6px;font-weight:600}.stream-badge.live{background:rgba(229,9,20,.2);color:var(--primary)}.stream-badge.live i{font-size:8px;animation:pulse 1.5s infinite}.stream-badge:not(.live){background:var(--bg3);color:var(--text2)}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}.toast{position:fixed;bottom:30px;right:50%;transform:translateX(50%);background:var(--bg3);color:var(--text);padding:12px 24px;border-radius:10px;font-size:13px;z-index:3000;opacity:0;pointer-events:none;transition:opacity .3s;border:1px solid var(--bg4);max-width:90%}.toast.show{opacity:1}.retry-btn{background:var(--primary);color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:12px;cursor:pointer;margin-top:10px;font-family:inherit}@media(max-width:600px){.grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}.header-inner{flex-direction:column;align-items:stretch}.search-box{max-width:none}.logo{justify-content:center}.player-container{padding:10px}.player-title{font-size:14px}}

  }
  c.innerHTML = h;
  c.addEventListener('click', function(e) {
    var btn = e.target.closest('.cat-btn');
    if (!btn) return;
    activeCategory = btn.getAttribute('data-cat');
    var all = document.querySelectorAll('.cat-btn');
    for (var i = 0; i < all.length; i++) all[i].classList.remove('active');
    btn.classList.add('active');
    filterChannels();
  });
}

function filterChannels() {
  var q = document.getElementById('searchInput').value.trim().toLowerCase();
  var g = document.getElementById('channelGrid');
  var f = [];
  for (var i = 0; i < CHANNELS.length; i++) {
    var ch = CHANNELS[i];
    if (activeCategory !== 'الكل' && ch.c !== activeCategory) continue;
    if (q !== '' && ch.n.toLowerCase().indexOf(q) < 0) continue;
    f.push(ch);
  }
  document.getElementById('totalCount').textContent = f.length;
  if (f.length === 0) {
    g.innerHTML = '<div class="no-channels"><i class="fas fa-search"></i><br>لا توجد قنوات مطابقة</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < f.length; i++) {
    var ch = f[i];
    var qual = getQuality(ch.n);
    var st = getStreamType(ch.u);
    var hasH = ch.h && typeof ch.h === 'object' && Object.keys(ch.h).length > 0;
    var logo = (ch.l || '').replace(/^http:/, 'https:') || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect fill=%22%231a2235%22 width=%22100%22 height=%22100%22/%3E%3Ctext y=%22.9em%22 font-size=%2240%22 text-anchor=%22middle%22 x=%2250%22 y=%2265%22 fill=%22%2364748b%22%3E%F0%9F%93%BA%3C/text%3E%3C/svg%3E';
    var nameEsc = ch.n.replace(/"/g, '&quot;');
    html += '<div class="channel-card" data-idx="' + i + '">' +
      '<div class="channel-thumb"><img src="' + logo + '" alt="' + nameEsc + '" loading="lazy" onerror="this.src=\'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect fill=%22%231a2235%22 width=%22100%22 height=%22100%22/%3E%3Ctext y=%22.9em%22 font-size=%2240%22 text-anchor=%22middle%22 x=%2250%22 y=%2265%22 fill=%22%2364748b%22%3E%F0%9F%93%BA%3C/text%3E%3C/svg%3E\'">' +
      '<div class="play-overlay"><i class="fas fa-play-circle"></i></div>' +
      (st ? '<span class="stream-type">' + st + '</span>' : '') +
      (hasH ? '<span class="header-badge"><i class="fas fa-shield-alt"></i></span>' : '') +
      (qual ? '<span class="quality-badge">' + qual + '</span>' : '') +
      '</div>' +
      '<div class="channel-info"><div class="channel-name">' + ch.n + '</div>' + (qual ? '<div class="channel-quality">' + qual + '</div>' : '') + '</div></div>';
  }
  g.innerHTML = html;
}

function showToast(msg) {
  var e = document.getElementById('toast');
  e.textContent = msg;
  e.classList.add('show');
  clearTimeout(e._timeout);
  e._timeout = setTimeout(function() { e.classList.remove('show'); }, 3500);
}

function destroyPlayer() {
  var p = currentPlayer;
  if (p) {
    if (p.destroy) { try { p.destroy(); } catch (e) {} }
    else if (p.unload) { try { p.unload(); } catch (e) {} }
    currentPlayer = null;
  }
  var video = document.getElementById('videoPlayer');
  video.pause();
  video.removeAttribute('src');
  video.load();
}

function playChannel(idx) {
  var ch = CHANNELS[idx];
  if (!ch || !ch.u) { showToast('عذراً، رابط هذه القناة غير متاح'); return; }

  currentChannel = ch;
  document.getElementById('playerTitle').textContent = ch.n;
  var qual = getQuality(ch.n);
  document.getElementById('streamTypeText').textContent = qual || getStreamType(ch.u);
  document.getElementById('streamTypeBadge').style.display = 'inline-flex';

  var overlay = document.getElementById('playerOverlay');
  var status = document.getElementById('playerStatus');
  var video = document.getElementById('videoPlayer');

  destroyPlayer();
  overlay.classList.add('show');
  status.classList.add('show');
  status.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري التحميل...';
  isRetrying = false;

  var url = ch.u;
  var isHls = url.indexOf('.m3u8') >= 0;
  var headers = ch.h || {};

  try {
    if (isHls) {
      if (!Hls.isSupported()) {
        if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = url;
          video.addEventListener('loadedmetadata', function() { status.style.display = 'none'; video.play().catch(function() {}); }, { once: true });
          video.addEventListener('error', function() { status.innerHTML = 'تعذر التشغيل'; }, { once: true });
        } else {
          status.innerHTML = 'المتصفح لا يدعم البث';
        }
        return;
      }
      var hlsUrl = proxyUrl(url, headers);
      currentPlayer = new Hls({ enableWorker: true, lowLatencyMode: false, backbufferLength: 30, maxBufferLength: 30, maxMaxBufferLength: 60 });
      currentPlayer.loadSource(hlsUrl);
      currentPlayer.attachMedia(video);
      currentPlayer.on(Hls.Events.MANIFEST_PARSED, function() { status.style.display = 'none'; video.play().catch(function() {}); });
      currentPlayer.on(Hls.Events.ERROR, function(e, data) {
        if (data.fatal) {
          if (!isRetrying) {
            isRetrying = true;
            status.innerHTML = '<i class="fas fa-sync-alt fa-spin"></i> خطأ – إعادة المحاولة...<br><br><button class="retry-btn" onclick="playChannel(' + idx + ')">إعادة التشغيل</button>';
            setTimeout(function() { if (currentPlayer) { currentPlayer.startLoad(); } isRetrying = false; }, 3000);
          } else {
            status.innerHTML = 'خطأ في البث. الرابط قد يكون منتهياً.<br><br><button class="retry-btn" onclick="playChannel(' + idx + ')">إعادة المحاولة</button>';
          }
        }
      });
    } else {
      // TS stream - use mpegts.js
      if (typeof mpegts === 'undefined') {
        status.innerHTML = 'مكتبة mpegts.js لم يتم تحميلها';
        return;
      }
      var tsUrl = proxyUrl(url, headers);
      currentPlayer = mpegts.createPlayer({
        type: 'mse',
        url: tsUrl,
        isLive: true,
        lazyMaxLatency: 30,
        lazyReconnect: 5,
        liveBufferLatencyChasing: true,
        fixAudioTimestampGap: false,
      });
      currentPlayer.attachMediaElement(video);
      currentPlayer.on(mpegts.Events.RECOVERED_EARLY_EOF, function() {
        status.style.display = 'none';
      });
      currentPlayer.on(mpegts.Events.LOADING_COMPLETE, function() {
        status.style.display = 'none';
      });
      currentPlayer.on(mpegts.Events.ERROR, function(errType, errDetail) {
        status.innerHTML = 'خطأ في البث (' + errType + ')<br><br><button class="retry-btn" onclick="playChannel(' + idx + ')">إعادة المحاولة</button>';
        if (!isRetrying) {
          isRetrying = true;
          setTimeout(function(p) {
            return function() {
              if (p && typeof p.unload === 'function') { try { p.unload(); p.load(); } catch (e) {} }
              isRetrying = false;
            };
          }(currentPlayer), 3000);
        }
      });
      currentPlayer.load();
      currentPlayer.play();
      // Hide loading after 5s if still showing (stream likely playing)
      setTimeout(function() { if (status.style.display !== 'none') status.style.display = 'none'; }, 5000);
    }
  } catch (err) {
    status.innerHTML = 'حدث خطأ: ' + err.message;
    console.error(err);
  }
}

function closePlayer() {
  document.getElementById('playerOverlay').classList.remove('show');
  destroyPlayer();
  currentChannel = null;
  document.getElementById('playerStatus').style.display = '';
  document.getElementById('playerStatus').innerHTML = 'جاري التحميل...';
}

// Global event delegation on channel grid (added once)
document.getElementById('channelGrid').addEventListener('click', function(e) {
  var card = e.target.closest('.channel-card');
  if (!card) return;
  var idx = parseInt(card.getAttribute('data-idx'), 10);
  if (!isNaN(idx)) playChannel(idx);
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closePlayer();
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); document.getElementById('searchInput').focus(); }
});

document.getElementById('closePlayerBtn').addEventListener('click', closePlayer);
document.getElementById('searchInput').addEventListener('input', filterChannels);

renderCategories();
filterChannels();
</script>
</body>
</html>
